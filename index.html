<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Knife Engraving Customiser</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto&family=Lobster&family=Chocolate+Classical+Sans&family=LXGW+WenKai+Mono+TC&family=Noto+Sans+HK&family=Noto+Serif+TC&display=swap" rel="stylesheet">

  <!-- JSZip for ZIP download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    :root {
      --accent: #d00024;
      --gray: #888;
      --bg: #fafafa;
      --border: #ddd;
      --pad: 1rem;
      --radius: .5rem;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: Roboto, Arial, sans-serif;
      background: var(--bg);
      color: #222;
    }
    h1,h2,h3 { text-align: center; margin: 1rem 0; }
    h3 { margin-bottom: 2rem; }
    /* === i18n === 语言按钮 */
    #lang-toggle{
      position:fixed;top:.75rem;right:.75rem;z-index:2000;
      background:var(--accent);color:#fff;border:none;border-radius:var(--radius);
      padding:.4rem .8rem;cursor:pointer;font-weight:600;
    }

    .container {
      max-width: 1200px; margin: auto; padding: var(--pad);
      display: flex; flex-direction: column; gap: var(--pad);
    }
    .page { display: none; }
    .page.active { display: block; }

    /* ……（其余样式同原文件，此处省略，已完全保留）…… */

    /* 为节省篇幅，以上除语言按钮外与原来保持一致 */
  </style>
</head>
<body>
  <!-- === i18n === 语言切换按钮 -->
  <button id="lang-toggle">中文</button>

  <h1 data-i18n="title">Knife Engraving Customiser</h1>
  <h3>by <img src="kool-logo.png" alt="logo" style="width:50px;vertical-align:bottom;"></h3>

  <div class="container">
    <!-- Page 1: Knife Selection -->
    <div id="page-1" class="page section active">
      <h2 data-i18n="chooseKnives">Choose your knives</h2>
      <div id="product-picker">
        <label class="product-option" data-i18n-wrapper="chef">
          <input type="checkbox" name="product" value="chef.jpg" data-thumb="chef-thumb.jpg" data-name="chef">
          <img src="chef-thumb.jpg" alt="Chef knife">
          <span data-i18n="chefKnife">Chef Knife</span>
        </label>
        <label class="product-option" data-i18n-wrapper="santoku">
          <input type="checkbox" name="product" value="santoku.jpg" data-thumb="santoku-thumb.jpg" data-name="santoku">
          <img src="santoku-thumb.jpg" alt="Santoku knife">
          <span data-i18n="santokuKnife">Santoku Knife</span>
        </label>
        <label class="product-option" data-i18n-wrapper="bread">
          <input type="checkbox" name="product" value="bread.jpg" data-thumb="bread-thumb.jpg" data-name="bread">
          <img src="bread-thumb.jpg" alt="Bread knife">
          <span data-i18n="breadKnife">Bread Knife</span>
        </label>
        <label class="product-option" data-i18n-wrapper="chopper">
          <input type="checkbox" name="product" value="chopper.jpg" data-thumb="chopper-thumb.jpg" data-name="chopper">
          <img src="chopper-thumb.jpg" alt="Chopper knife">
          <span data-i18n="chopperKnife">Chopper Knife</span>
        </label>
        <label class="product-option" data-i18n-wrapper="utility">
          <input type="checkbox" name="product" value="utility.jpg" data-thumb="utility-thumb.jpg" data-name="utility">
          <img src="utility-thumb.jpg" alt="Utility knife">
          <span data-i18n="utilityKnife">Utility Knife</span>
        </label>
        <label class="product-option" data-i18n-wrapper="paring">
          <input type="checkbox" name="product" value="paring.jpg" data-thumb="paring-thumb.jpg" data-name="paring">
          <img src="paring-thumb.jpg" alt="Paring knife">
          <span data-i18n="paringKnife">Paring Knife</span>
        </label>
      </div>
      <div class="navigation">
        <button id="next-1" data-i18n="next">Next</button>
      </div>
    </div>

    <!-- Page 2 / 3 / 4 与原相同，只需在可见文字上加 data-i18n（已全部完成，下文省略重复标注） -->
    <div id="page-2" class="page">
      <div id="big-knife-content"></div>
      <div class="navigation">
        <button id="back-2" data-i18n="back">Back</button>
        <button id="next-2" data-i18n="next">Next</button>
      </div>
    </div>

    <div id="page-3" class="page">
      <div id="small-knife-content"></div>
      <div class="navigation">
        <button id="back-3" data-i18n="back">Back</button>
        <button id="next-3" data-i18n="preview">Preview</button>
      </div>
    </div>

    <div id="page-4" class="page section">
      <h2 data-i18n="previewAll">Preview All Knives</h2>
      <div class="preview-description" data-i18n="clickEnlarge">Click any image to enlarge</div>
      <div id="preview-content" class="preview-list"></div>
      <div class="navigation">
        <button id="back-4" data-i18n="back">Back</button>
        <button id="download-all" data-i18n="download">Download</button>
      </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
      <img id="modal-image" src="" alt="Enlarged preview">
    </div>
  </div>

  <script>
    /* ===================== i18n 字典 ===================== */
    const dict = {
      en: {
        title: 'Knife Engraving Customiser',
        chooseKnives: 'Choose your knives',
        next: 'Next',
        back: 'Back',
        preview: 'Preview',
        download: 'Download',
        previewAll: 'Preview All Knives',
        clickEnlarge: 'Click any image to enlarge',
        chefKnife: 'Chef Knife',
        santokuKnife: 'Santoku Knife',
        breadKnife: 'Bread Knife',
        chopperKnife: 'Chopper Knife',
        utilityKnife: 'Utility Knife',
        paringKnife: 'Paring Knife',
        text:'Text:',
        font:'Font:',
        same:'Use same text for all',
        drag1:'• Drag text to move.',
        drag2:'• Drag a corner to scale (desktop).',
        drag3:'• Pinch to zoom and move text (mobile).',
        scaleBtn:'Scale Handles',
        sizeSync:'Size Sync',
        autoAlign:'Auto Alignment',
        loading:'Loading…'
      },
      zh: {
        title: '刀具刻字定制',
        chooseKnives: '选择你的刀具',
        next: '下一步',
        back: '返回',
        preview: '预览',
        download: '下载',
        previewAll: '全部刀具预览',
        clickEnlarge: '点击图片放大',
        chefKnife: '主厨刀',
        santokuKnife: '三德刀',
        breadKnife: '面包刀',
        chopperKnife: '菜刀',
        utilityKnife: '多用途刀',
        paringKnife: '削皮刀',
        text:'文字：',
        font:'字体：',
        same:'所有刀具使用相同文字',
        drag1:'• 拖动文字移动。',
        drag2:'• 拖动角以缩放（桌面）。',
        drag3:'• 双指捏合放大/移动文字（移动端）。',
        scaleBtn:'缩放控制',
        sizeSync:'字体同步',
        autoAlign:'自动对齐',
        loading:'加载中…'
      }
    };
    let lang='en';

    function t(key){ return dict[lang][key]||key; }

    // 统一刷新页面文字
    function applyLang(){
      document.querySelectorAll('[data-i18n]').forEach(el=>{
        el.textContent=t(el.dataset.i18n);
      });
      // 切换按钮本身
      document.getElementById('lang-toggle').textContent = lang==='en' ? '中文' : 'En';
    }

    // === 语言切换按钮
    document.getElementById('lang-toggle').addEventListener('click',()=>{
      lang = lang==='en' ? 'zh' : 'en';
      applyLang();
      // 重绘已生成刀具区域（按钮、提示文字等）
      Object.keys(state).forEach(k=>{
        rebuildSectionLabels(k);
        draw(k);
      });
    });

    /* ===================== 原脚本（大部分保持原样） ===================== */
    const knives = { big:['santoku','chef','bread','chopper'], small:['utility','paring'] };
    const state={};
    /* ……后续全部原有 JS 逻辑保持不变…… */

    /* ---------- 下面仅展示与文字相关的新增/修改 ---------- */

    // rebuildSectionLabels: 根据当前语言刷新动态生成的 section 内文字与按钮
    function rebuildSectionLabels(knife){
      const s=state[knife];
      if(!s) return;
      s.wrapper.parentElement.querySelector('label[for="text-'+knife+'"]').textContent=t('text');
      s.wrapper.parentElement.querySelector('label[for="font-'+knife+'"]').textContent=t('font');
      if(s.sameContentChk){
        s.wrapper.parentElement.querySelector('.same-content label').textContent=t('same');
      }
      s.wrapper.parentElement.querySelectorAll('p')[0].innerHTML=
        `${t('drag1')}<br>${t('drag2')}<br>${t('drag3')}`;
      s.scaleBtn.textContent=t('scaleBtn');
      s.fontSyncBtn.textContent=t('sizeSync');
      s.alignToggleBtn.textContent=t('autoAlign');
      s.overlay.textContent=t('loading');
    }

    // 修改 createCanvasSection 中所有英文硬编码 => t()   （仅展示被改行）
    function createCanvasSection(knife){
      const isBig=knives.big.includes(knife);
      const showSameContent=knife===firstSelectedKnife;
      const section=document.createElement('div');
      section.className='knife-section';
      section.innerHTML=`
        <h3>${t(knife+'Knife')||knife}</h3>
        <div class="controls">
          <div>
            <label for="text-${knife}">${t('text')}</label>
            <input type="text" id="text-${knife}" placeholder="${t('text').replace(':','')}">
          </div>
          <div>
            <label for="font-${knife}">${t('font')}</label>
            <select id="font-${knife}">
              <optgroup label="${lang==='en'?'English':'英文'}">
                <option value="Montserrat">Montserrat</option>
                <option value="Roboto">Roboto</option>
                <option value="Lobster">Lobster</option>
                <option value="'Times New Roman',serif">Times New Roman</option>
                <option value="'Courier New',monospace">Courier New</option>
                <option value="Arial,sans-serif">Arial</option>
              </optgroup>
              <optgroup label="${lang==='en'?'Chinese':'中文'}">
                <option value="'Chocolate Classical Sans',sans-serif">Chocolate Classical Sans</option>
                <option value="'LXGW WenKai Mono TC',monospace">LXGW WenKai Mono TC</option>
                <option value="'Noto Sans HK',sans-serif">Noto Sans Hong Kong</option>
                <option value="'Noto Serif TC',serif">Noto Serif Traditional Chinese</option>
              </optgroup>
            </select>
          </div>
        </div>
        ${showSameContent?`
          <div class="same-content">
            <input type="checkbox" id="same-content-${knife}" ${sameContent?'checked':''}>
            <label for="same-content-${knife}">${t('same')}</label>
          </div>`:''}
        <p style="font-size:.8rem;color:#666;margin-top:.5rem;">
          ${t('drag1')}<br>${t('drag2')}<br>${t('drag3')}
        </p>
        <div class="canvas-wrapper" id="wrapper-${knife}">
          <canvas id="canvas-${knife}"></canvas>
          <div class="loading-overlay" id="overlay-${knife}">${t('loading')}</div>
          <div class="bbox" id="bbox-${knife}">
            <div class="handle" data-handle="nw"></div>
            <div class="handle" data-handle="ne"></div>
            <div class="handle" data-handle="sw"></div>
            <div class="handle" data-handle="se"></div>
          </div>
        </div>
        <div class="button-group">
          <button id="scale-${knife}" class="scale-btn">${t('scaleBtn')}</button>
          <button id="font-sync-${knife}" class="${syncFont[isBig?'big':'small']?'':'off'}">${t('sizeSync')}</button>
          <button id="align-toggle-${knife}" class="${alignRight[isBig?'big':'small']?'off':''}">${t('autoAlign')}</button>
        </div>
      `;
      /* ……原逻辑继续…… */
    }

    /* 在 initializeKnife() 末尾调用 rebuildSectionLabels 初次同步 */
    /* 同时在页面加载完后执行一次 applyLang() */
    window.addEventListener('DOMContentLoaded',applyLang);

  </script>
</body>
</html>
